name: Publish image

# Build the Herald image and push to GHCR on every version tag (v*), matching the
# tag-to-release flow. Also runnable manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # write: needed to create the GitHub Release on tag
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR image names must be lowercase; hardcoded so a repo rename can't
          # silently change it. Update if you move/rename the repo or owner.
          images: ghcr.io/kernicek/herald
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Only on real tag pushes (not manual workflow_dispatch): create/refresh the
      # GitHub Release, auto-generating "what's changed" and appending the image ref.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            **Docker image:** `ghcr.io/kernicek/herald:${{ steps.meta.outputs.version }}` (also `:latest`)

            ```
            docker pull ghcr.io/kernicek/herald:${{ steps.meta.outputs.version }}
            ```

            See the [README](https://github.com/kernicek/Herald#readme) for deploy steps.
